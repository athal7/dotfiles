# Capability → provider bindings
# Values can be a skill name, cli://<binary>, or mcp://<server>.
# The agent resolves requires entries against this manifest.
# Override per-workspace by placing a capabilities.yaml in .agents/ or the workspace root.

issues: cli://linear

chat: slack

figma: figma

logs: elasticsearch

pull-requests: gh-pr-inline

calendar: cli://ical

reminders: remindctl

meetings: cli://minutes

agent: opencode

pty: pty

todo: todo

qa: qa

chezmoi: chezmoi-apply

architecture: architecture
tdd: tdd
commit: commit
push: push
