repos:
  # Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
        exclude: (^|/)modify_[^/]*\.json$
      - id: check-toml
        exclude: (^|/)modify_[^/]*\.toml$
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files

  # JSON Schema validation (validates opencode.json against its $schema)
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.30.0
    hooks:
      - id: check-jsonschema
        name: validate opencode.json schema
        files: dot_config/opencode/opencode\.json$
        args: ["--schemafile", "https://opencode.ai/config.json", "--no-cache"]

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        # Exclude zsh scripts (shellcheck doesn't support zsh), direnvrc, and
        # .tmpl files (raw Go-template control-flow syntax isn't valid bash
        # pre-render; the chezmoi-templates hook below shellchecks the
        # rendered output instead).
        exclude: (direnvrc|reload-shell\.sh|\.tmpl)$
        args: [--shell=bash]

  # Chezmoi template validation
  - repo: local
    hooks:
      - id: chezmoi-templates
        name: validate chezmoi templates
        # Renders each .tmpl, then — since Go-template control-flow syntax
        # embedded in a shell script isn't valid bash/sh/zsh pre-render, and
        # the raw shellcheck hook above therefore excludes .tmpl files
        # entirely — shellchecks the *rendered* output when it starts with a
        # sh/bash/zsh shebang, so template-driven scripts still get linted.
        entry: bash -c 'src="$(git rev-parse --show-toplevel)"; status=0; for f in "$@"; do rendered=$(chezmoi execute-template -S "$src" < "$f") || { status=1; continue; }; if head -1 <<<"$rendered" | grep -qE "^#!.*\b(ba|z)?sh\b"; then shellcheck --shell=bash --severity=error <(printf "%s\n" "$rendered") || status=1; fi; done; exit $status' --
        language: system
        files: \.tmpl$
        exclude: ^\.chezmoi\.toml\.tmpl$

  # Agent Skills validation
  - repo: local
    hooks:
      - id: validate-skills
        name: validate skill frontmatter
        entry: scripts/validate-skills.sh
        language: script
        files: dot_agents/skills/.*/SKILL\.md$
      - id: validate-opencode-plugins
        name: no blocking calls in opencode plugins
        entry: scripts/validate-opencode-plugins.sh
        language: script
        files: ^dot_config/opencode/plugins/.*\.ts$
      - id: test-opencode-cleanup
        name: opencode cleanup tooling tests
        entry: scripts/test-opencode-cleanup.sh
        language: script
        always_run: true
        pass_filenames: false

  # Talisman (secrets scanning) - already configured, keep it
  - repo: https://github.com/thoughtworks/talisman
    rev: v1.32.0
    hooks:
      - id: talisman-commit
