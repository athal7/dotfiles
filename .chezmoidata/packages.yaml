packages:
  taps:
    - github/gh
    - steipete/tap
    - schpet/tap
    - pchuri/tap

  brews:
    - name: autojump
    - name: bat
    - name: chezmoi
      permissions:
        ask:
          - "chezmoi destroy*"
          - "chezmoi init*"
        allow_reads:
          - "chezmoi cat*"
          - "chezmoi verify*"
          - "chezmoi diff*"
          - "chezmoi data*"
          - "chezmoi managed*"
          - "chezmoi execute-template*"
    - name: colima
    - name: direnv
    - name: docker
    - name: docker-compose
    - name: ffmpeg
    - name: git
      permissions:
        allow_reads:
          - "git log*"
          - "git diff*"
          - "git status*"
          - "git show*"
          - "git rev-parse*"
          - "git blame*"
          - "git stack-log*"
          - "git stack-diff*"
          - "git stack-range*"
    - name: gh
      permissions:
        ask:
          - "gh *"
        allow_reads:
          - "gh search*"
          - "gh pr list*"
          - "gh pr view*"
          - "gh pr diff*"
          - "gh pr checks*"
          - "gh issue list*"
          - "gh issue view*"
          - "gh repo view*"
          - "gh run list*"
          - "gh run view*"
    - name: git-spice
    - name: jc
    - name: jq
      permissions:
        allow_reads:
          - "jq*"
    - name: graphqurl
    - name: k9s
    - name: kubernetes-cli
    - name: mas
    - name: mise
    - name: neovim
    - name: ollama
    - name: openssl
    - name: opentofu
    - name: ripgrep
      permissions:
        allow_reads:
          - "rg*"
    - name: starship
    - name: talisman
    - name: watch
    - name: worktrunk
    - name: googleworkspace-cli
      command: gws
      permissions:
        allow_reads:
          - "gws docs documents get*"
          - "gws drive files list*"
          - "gws drive files export*"
    - name: steipete/tap/remindctl
      command: remindctl
      permissions:
        ask:
          - "remindctl add*"
          - "remindctl edit*"
          - "remindctl delete*"
          - "remindctl complete*"
        allow_reads:
          - "remindctl show*"
          - "remindctl list*"
          - "remindctl status*"
    - name: schpet/tap/linear
      command: linear
      permissions:
        ask:
          - "linear *"
        allow_reads:
          - "linear issue view*"
          - "linear issue list*"
          - "linear issue mine*"
          - "linear issue describe*"
          - "linear team list*"
          - "linear team members*"
          - "linear project list*"
          - "linear project view*"
          - "linear cycle list*"
          - "linear cycle view*"
          - "linear schema*"
          - "linear auth whoami*"
    - name: pchuri/tap/confluence-cli
      command: confluence
      permissions:
        ask:
          - "confluence create*"
          - "confluence update*"
          - "confluence delete*"
          - "confluence append*"
          - "confluence reply*"
        allow_reads:
          - "confluence read*"
          - "confluence search*"
          - "confluence find*"

  casks:
    - name: gcloud-cli
    - name: font-monaspace
    - name: ghostty
    - name: claude-code
    - name: stats
    - name: tailscale-app
    - name: handy
    - name: lm-studio

  # GitHub releases — installed via .chezmoiexternal.toml.tmpl
  github_releases:
    - name: opencode
      repo: sst/opencode
      target: .local/bin/opencode
      asset: opencode-darwin-arm64.zip
      type: archive-file
      path: opencode
      executable: true
      refresh_period: 24h

    - name: opencode-desktop
      repo: sst/opencode
      target: Applications
      app: OpenCode.app
      asset: opencode-desktop-mac-arm64.app.tar.gz
      type: archive
      refresh_period: 24h

    - name: naya-flow-beta
      repo: NayaTech/NayaFlow-beta-releases
      target: Applications
      app: NayaFlow-Beta.app
      asset: NayaFlow-Beta-*-arm64-mac.zip
      type: archive
      refresh_period: 24h

    - name: ical
      repo: BRO3886/ical
      target: .local/bin/ical
      asset: ical-darwin-arm64.tar.gz
      type: archive-file
      path: ical
      executable: true
      refresh_period: 24h
      permissions:
        ask:
          - "ical add*"
          - "ical update*"
          - "ical delete*"
          - "ical calendars create*"
          - "ical calendars update*"
          - "ical calendars delete*"
        allow_reads:
          - "ical today*"
          - "ical upcoming*"
          - "ical list*"
          - "ical show*"
          - "ical search*"

    - name: minutes
      repo: silverstein/minutes
      target: .local/bin/minutes
      asset: minutes-macos-arm64
      type: file
      executable: true
      refresh_period: 24h
      permissions:
        allow_reads:
          - "minutes list*"
          - "minutes search*"
          - "minutes get*"
          - "minutes person*"
          - "minutes research*"
          - "minutes actions*"
          - "minutes consistency*"

    - name: minutes-desktop
      repo: silverstein/minutes
      target: Applications
      app: Minutes.app
      asset: Minutes.app.tar.gz
      type: archive
      refresh_period: 24h

  # agent skills installed via gh skill install
  skills:
    - repo: BRO3886/ical
      skill: ical-cli
    - repo: schpet/linear-cli
      skill: linear-cli

  # npm-managed global packages
  npm:
    homebridge_version: "1.11.4"
    ui_version: "5.21.0"
    nest_plugin_version: "0.3.9"
    ffmpeg_for_homebridge_version: "2.2.2"

  # mise-managed runtimes and tools
  mise:
    - name: ruby
      version: "3.4"
    - name: node
      version: lts
    - name: python
      version: "3"
    - name: rust
      version: stable
    - name: ruff
      version: latest
    - name: uv
      version: latest
    - name: pre-commit
      version: latest
    - name: terraform
      version: latest
    - name: helm
      version: latest
    - name: argocd
      version: latest
    - name: pipx:check-jsonschema
      version: latest
    - name: pipx:grip
      version: latest
    - name: pipx:skills-ref
      version: latest
