packages:
  taps:
    - github/gh
    - steipete/tap
    - schpet/tap
    - pchuri/tap

  brews:
    - name: autojump
    - name: bat
    - name: chezmoi
      permissions:
        always_allow:
          - execute-template
          - source-path
        build: deny
    - name: colima
    - name: direnv
    - name: docker
    - name: docker-compose
    - name: ffmpeg
    - name: git
      permissions:
        always_allow:
          - rev-parse
          - merge-base
          - for-each-ref
          - ls-files
          - ls-tree
          - ls-remote
          - cat-file
          - reflog
          - shortlog
          - name-rev
          - symbolic-ref
          - stack-log
          - stack-diff
          - stack-range
        build: deny
    - name: gh
      permissions:
        always_allow:
          - checks
        build: deny
    - name: git-spice
    - name: jc
    - name: jq
    - name: graphqurl
    - name: k9s
    - name: kubernetes-cli
    - name: mas
    - name: mise
    - name: neovim
    - name: openssl
    - name: opentofu
    - name: ripgrep
    - name: starship
    - name: talisman
    - name: watch
    - name: worktrunk
    - name: googleworkspace-cli
      command: gws
      permissions:
        always_allow:
          - drive files export
        build: deny
    - name: steipete/tap/remindctl
      command: remindctl
      permissions:
        build: deny
    - name: schpet/tap/linear
      command: linear
      permissions:
        always_allow:
          - mine
          - members
          - schema
        build: deny
    - name: pchuri/tap/confluence-cli
      command: confluence
      permissions:
        build: deny

  casks:
    - name: gcloud-cli
    - name: font-monaspace
    - name: ghostty
    - name: claude-code
    - name: stats
    - name: tailscale-app
    - name: lm-studio

  # GitHub releases — installed via .chezmoiexternal.toml.tmpl
  github_releases:
    - name: opencode
      repo: sst/opencode
      target: .local/bin/opencode
      asset: opencode-darwin-arm64.zip
      type: archive-file
      path: opencode
      executable: true
      refresh_period: 24h

    - name: opencode-desktop
      repo: sst/opencode
      target: Applications
      app: OpenCode.app
      asset: opencode-desktop-mac-arm64.app.tar.gz
      type: archive
      refresh_period: 24h

    - name: naya-flow-beta
      repo: NayaTech/NayaFlow-beta-releases
      target: Applications
      app: NayaFlow-Beta.app
      asset: NayaFlow-Beta-*-arm64-mac.zip
      type: archive
      refresh_period: 24h

    - name: ical
      repo: BRO3886/ical
      target: .local/bin/ical
      asset: ical-darwin-arm64.tar.gz
      type: archive-file
      path: ical
      executable: true
      refresh_period: 24h
      permissions:
        always_allow:
          - today
          - upcoming
        build: deny

    - name: minutes
      repo: silverstein/minutes
      target: .local/bin/minutes
      asset: minutes-macos-arm64
      type: file
      executable: true
      refresh_period: 24h
      permissions:
        always_allow:
          - person
          - research
          - consistency
        build: deny

    - name: minutes-desktop
      repo: silverstein/minutes
      target: Applications
      app: Minutes.app
      asset: Minutes.app.tar.gz
      type: archive
      refresh_period: 24h

  # agent skills installed via gh skill install
  skills:
    - repo: BRO3886/ical
      skill: ical-cli
    - repo: schpet/linear-cli
      skill: linear-cli

  # npm-managed global packages
  npm:
    homebridge_version: "1.11.4"
    ui_version: "5.21.0"
    nest_plugin_version: "0.3.9"
    ffmpeg_for_homebridge_version: "2.2.2"

  # mise-managed runtimes and tools
  mise:
    - name: ruby
      version: "3.4"
    - name: node
      version: lts
    - name: python
      version: "3"
    - name: rust
      version: stable
    - name: ruff
      version: latest
    - name: uv
      version: latest
    - name: pre-commit
      version: latest
    - name: terraform
      version: latest
    - name: helm
      version: latest
    - name: argocd
      version: latest
    - name: pipx:check-jsonschema
      version: latest
    - name: pipx:grip
      version: latest
    - name: pipx:skills-ref
      version: latest
