# Package registry — single source of truth for all managed dependencies.
# brew, cask, mise, and GitHub release packages. Install scripts and
# chezmoi externals are generated from this file.
#
# Each entry can also declare per-tool permission rules for OpenCode agents
# (merged into opencode.json at template time).

packages:
  taps:
    - github/gh
    - steipete/tap

  brews:
    - name: autojump
    - name: bat
      permissions:
        "bat *": allow
    - name: chezmoi
      permissions:
        "chezmoi cat*": allow
        "chezmoi verify*": allow
        "chezmoi diff*": allow
        "chezmoi data*": allow
        "chezmoi status*": allow
        "chezmoi managed*": allow
        "chezmoi execute-template*": allow
        "chezmoi source-path*": allow
        "chezmoi *": ask
    - name: colima
    - name: direnv
    - name: docker
    - name: docker-compose
    - name: ffmpeg
    - name: git
      permissions:
        "git log*": allow
        "git diff*": allow
        "git show*": allow
        "git status*": allow
        "git blame*": allow
        "git reflog*": allow
        "git shortlog*": allow
        "git rev-parse*": allow
        "git merge-base*": allow
        "git for-each-ref*": allow
        "git ls-*": allow
        "git cat-file*": allow
        "git name-rev*": allow
        "git symbolic-ref*": allow
        "git * list*": allow
        "git * show*": allow
        "git branch*": allow
        "git tag -l*": allow
        "git config*": allow
        "git stack-*": allow
        "git checkout*": allow
        "git fetch*": allow
        "git stash*": allow
        "git reset --soft*": allow
        "git reset --mixed*": allow
        "git reset HEAD*": allow
        "git restore --staged*": allow
        "git *": ask
    - name: gh
      permissions:
        "gh * list*": allow
        "gh * view*": allow
        "gh * diff*": allow
        "gh * checks*": allow
        "gh * status*": allow
        "gh search*": allow
        "gh api -X GET *": allow
        "gh api graphql*mutation*": ask
        "gh api graphql*": allow
        "gh *": ask
    - name: git-spice
    - name: jc
    - name: jq
      permissions:
        "jq *": allow
    - name: k9s
    - name: kubernetes-cli
    - name: mas
    - name: mise
    - name: neovim
    - name: openspec
      permissions:
        "openspec list*": allow
        "openspec status*": allow
        "openspec instructions*": allow
        "openspec show*": allow
        "openspec validate*": allow
        "openspec view*": allow
        "openspec schemas*": allow
        "openspec templates*": allow
        "openspec config*": allow
        "openspec new*": allow
        "openspec *": ask
    - name: openssl
    - name: opentofu
    - name: ripgrep
      permissions:
        "rg *": allow
    - name: starship
    - name: talisman
    - name: watch
    - name: worktrunk
    - name: xh
      permissions:
        "xh *GET *": allow
        "xh *HEAD *": allow
        "xh *mutation*": ask
        "xh *query*": allow
        "xh *": ask
    - name: googleworkspace-cli
      permissions:
        "gws * list*": allow
        "gws * get*": allow
        "gws *": ask
    - name: steipete/tap/remindctl
      permissions:
        "remindctl show*": allow
        "remindctl list*": allow
        "remindctl status*": allow
        "remindctl *": ask
    - name: typescript-language-server
    - name: pyright
    - name: gopls
    - name: terraform-ls
    - name: lua-language-server
    - name: bash-language-server
    - name: yaml-language-server

  casks:
    - name: gcloud-cli
    - name: font-monaspace
    - name: ghostty
    - name: claude-code
    - name: stats
    - name: tailscale-app
    - name: lm-studio
    - name: obsidian

  # GitHub releases — installed via .chezmoiexternal.toml.tmpl
  github_releases:
    - name: opencode
      repo: sst/opencode
      target: .local/bin/opencode
      asset: opencode-darwin-arm64.zip
      type: archive-file
      path: opencode
      executable: true
      refresh_period: 24h
      permissions:
        "opencode session *": allow
        "opencode export *": allow
        "opencode *": ask

    - name: opencode-desktop
      repo: sst/opencode
      target: Applications
      app: OpenCode.app
      asset: opencode-desktop-mac-arm64.app.tar.gz
      type: archive
      refresh_period: 24h

    # Note: com.apple.provenance on Apple Silicon prevents chezmoi's atomic
    # rename from updating files inside this bundle. On version updates, run:
    #   rm -rf ~/Applications/NayaFlow-Beta.app && chezmoi apply
    - name: naya-flow-beta
      repo: NayaTech/NayaFlow-beta-releases
      target: Applications
      app: NayaFlow-Beta.app
      asset: NayaFlow-Beta-*-arm64-mac.zip
      type: archive
      refresh_period: 24h

    - name: ical
      repo: BRO3886/ical
      target: .local/bin/ical
      asset: ical-darwin-arm64.tar.gz
      type: archive-file
      path: ical
      executable: true
      refresh_period: 24h
      permissions:
        "ical today*": allow
        "ical upcoming*": allow
        "ical list*": allow
        "ical show*": allow
        "ical *": ask

  # Non-authored skills synced into the global skill dir. Two entry shapes:
  #   - remote: { repo, skill }   → fetched via `gh skill install`
  #   - local:  { source, match } → mirrored from a project dir (skills a CLI
  #     like openspec generates project-locally; `match` globs the dir names)
  skills:
    - repo: BRO3886/ical
      skill: ical-cli
    - source: .opencode/skills
      match: openspec-*

  # npm-managed global packages
  npm:
    homebridge_version: "1.11.4"
    ui_version: "5.21.0"
    nest_plugin_version: "0.4.1"
    ffmpeg_for_homebridge_version: "2.2.2"

  # mise-managed runtimes and tools
  mise:
    - name: ruby
      version: "3.4"
      permissions:
        "bundle exec rspec*": allow
        "bundle exec rake test*": allow
        "bin/rails test*": allow
    - name: node
      version: lts
      permissions:
        "npm test*": allow
    - name: python
      version: "3"
    - name: rust
      version: stable
      permissions:
        "cargo test*": allow
    - name: ruff
      version: latest
    - name: uv
      version: latest
    - name: pre-commit
      version: latest
    - name: terraform
      version: latest
    - name: helm
      version: latest
    - name: argocd
      version: latest
    - name: pipx:pytest
      version: latest
      permissions:
        "pytest *": allow
    - name: pipx:check-jsonschema
      version: latest
    - name: pipx:grip
      version: latest
    - name: pipx:skills-ref
      version: latest
      permissions:
        "agentskills *": allow
