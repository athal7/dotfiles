packages:
  taps:
    - github/gh
    - silverstein/tap
    - steipete/tap
    - schpet/tap

  brews:
    - name: autojump
    - name: bat
    - name: chezmoi
    - name: colima
    - name: direnv
    - name: docker
    - name: docker-compose
    - name: ffmpeg
    - name: gh
    - name: git-spice
    - name: jc
    - name: jq
    - name: graphqurl
    - name: k9s
    - name: kubernetes-cli
    - name: mas
    - name: mise
    - name: neovim
    - name: ollama
    - name: openssl
    - name: opentofu
    - name: ripgrep
    - name: starship
    - name: talisman
    - name: wakatime-cli
    - name: watch
    - name: worktrunk
    - name: googleworkspace-cli
    - name: steipete/tap/remindctl
    - name: schpet/tap/linear
    - name: pnpm

  casks:
    - name: gcloud-cli
    - name: font-monaspace
    - name: ghostty
    - name: claude-code
    - name: silverstein/tap/minutes
    - name: stats
    - name: tailscale-app

  # GitHub releases — installed via .chezmoiexternal.toml.tmpl
  github_releases:
    - name: opencode
      repo: sst/opencode
      target: .local/bin/opencode
      asset: opencode-darwin-arm64.zip
      type: archive-file
      path: opencode
      executable: true
      refresh_period: 24h

    - name: opencode-desktop
      repo: sst/opencode
      target: Applications
      app: OpenCode.app
      asset: opencode-desktop-darwin-aarch64.app.tar.gz
      type: archive
      refresh_period: 24h

    - name: naya-flow-beta
      repo: NayaTech/NayaFlow-beta-releases
      target: Applications
      app: NayaFlow-Beta.app
      asset: NayaFlow-Beta-*-arm64-mac.zip
      type: archive
      refresh_period: 168h

    - name: ical
      repo: BRO3886/ical
      target: .local/bin/ical
      asset: ical-darwin-arm64.tar.gz
      type: archive-file
      path: ical
      executable: true
      refresh_period: 168h

    - name: minutes
      repo: silverstein/minutes
      target: .local/bin/minutes
      asset: minutes-macos-arm64
      type: file
      executable: true
      refresh_period: 24h

  # npm-managed global packages
  npm:
    homebridge_version: "1.11.4"
    ui_version: "5.21.0"
    nest_plugin_version: "0.3.9"
    ffmpeg_for_homebridge_version: "2.2.2"

  # mise-managed runtimes and tools
  mise:
    - name: ruby
      version: "3.4"
    - name: node
      version: lts
    - name: python
      version: "3"
    - name: rust
      version: stable
    - name: ruff
      version: latest
    - name: uv
      version: latest
    - name: pre-commit
      version: latest
    - name: terraform
      version: latest
    - name: helm
      version: latest
    - name: argocd
      version: latest
    - name: pipx:check-jsonschema
      version: latest
    - name: pipx:grip
      version: latest
    - name: pipx:skills-ref
      version: latest
