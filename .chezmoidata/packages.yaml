packages:
  taps:
    - github/gh
    - steipete/tap
    - pchuri/tap

  brews:
    - name: autojump
    - name: bat
      permissions:
        "*":
          "*": allow
    - name: chezmoi
      permissions:
        "cat*":
          lead: allow
          plan: allow
        "verify*":
          lead: allow
          plan: allow
        "diff*":
          lead: allow
          plan: allow
        "data*":
          lead: allow
          plan: allow
        "status*":
          lead: allow
          plan: allow
        "managed*":
          lead: allow
          plan: allow
        "execute-template*":
          "*": allow
        "source-path*":
          "*": allow
        "*":
          build: deny
    - name: colima
    - name: direnv
    - name: docker
    - name: docker-compose
    - name: ffmpeg
    - name: git
      permissions:
        "log*":
          "*": allow
        "diff*":
          "*": allow
        "show*":
          "*": allow
        "status*":
          "*": allow
        "blame*":
          "*": allow
        "reflog*":
          "*": allow
        "shortlog*":
          "*": allow
        "rev-parse*":
          "*": allow
        "merge-base*":
          "*": allow
        "for-each-ref*":
          "*": allow
        "ls-*":
          "*": allow
        "cat-file*":
          "*": allow
        "name-rev*":
          "*": allow
        "symbolic-ref*":
          "*": allow
        "* list*":
          "*": allow
        "* show*":
          "*": allow
        "branch -v*":
          "*": allow
        "tag -l*":
          "*": allow
        "config --get*":
          "*": allow
        "stack-*":
          "*": allow
        "*":
          build: deny
    - name: gh
      permissions:
        "* list*":
          lead: allow
          plan: allow
        "* view*":
          lead: allow
          plan: allow
        "* diff*":
          lead: allow
          plan: allow
        "* checks*":
          lead: allow
          plan: allow
        "* status*":
          lead: allow
          plan: allow
        "search*":
          lead: allow
          plan: allow
        "api -X GET *":
          lead: allow
          plan: allow
        "*":
          build: deny
    - name: git-spice
    - name: jc
    - name: jq
      permissions:
        "*":
          "*": allow
    - name: graphqurl
      command: gq
      permissions:
        "*":
          build: deny
    - name: k9s
    - name: kubernetes-cli
    - name: mas
    - name: mise
    - name: neovim
    - name: openssl
    - name: opentofu
    - name: ripgrep
      command: rg
      permissions:
        "*":
          "*": allow
    - name: starship
    - name: talisman
    - name: watch
    - name: worktrunk
    - name: xh
      permissions:
        "*GET *":
          lead: allow
          plan: allow
        "*HEAD *":
          lead: allow
          plan: allow
        "*":
          build: deny
    - name: googleworkspace-cli
      command: gws
      permissions:
        "* list*":
          lead: allow
          plan: allow
        "* get*":
          lead: allow
          plan: allow
        "*":
          build: deny
    - name: steipete/tap/remindctl
      command: remindctl
      permissions:
        "show*":
          lead: allow
          plan: allow
        "list*":
          lead: allow
          plan: allow
        "status*":
          lead: allow
          plan: allow
        "*":
          build: deny
    - name: pchuri/tap/confluence-cli
      command: confluence
      permissions:
        "read*":
          lead: allow
          plan: allow
        "search*":
          lead: allow
          plan: allow
        "find*":
          lead: allow
          plan: allow
        "*":
          build: deny

  casks:
    - name: gcloud-cli
    - name: font-monaspace
    - name: ghostty
    - name: claude-code
    - name: stats
    - name: tailscale-app
    - name: lm-studio

  # GitHub releases — installed via .chezmoiexternal.toml.tmpl
  github_releases:
    - name: opencode
      repo: sst/opencode
      target: .local/bin/opencode
      asset: opencode-darwin-arm64.zip
      type: archive-file
      path: opencode
      executable: true
      refresh_period: 24h

    - name: opencode-desktop
      repo: sst/opencode
      target: Applications
      app: OpenCode.app
      asset: opencode-desktop-mac-arm64.app.tar.gz
      type: archive
      refresh_period: 24h

    # Note: com.apple.provenance on Apple Silicon prevents chezmoi's atomic
    # rename from updating files inside this bundle. On version updates, run:
    #   rm -rf ~/Applications/NayaFlow-Beta.app && chezmoi apply
    - name: naya-flow-beta
      repo: NayaTech/NayaFlow-beta-releases
      target: Applications
      app: NayaFlow-Beta.app
      asset: NayaFlow-Beta-*-arm64-mac.zip
      type: archive
      refresh_period: 24h

    - name: ical
      repo: BRO3886/ical
      target: .local/bin/ical
      asset: ical-darwin-arm64.tar.gz
      type: archive-file
      path: ical
      executable: true
      refresh_period: 24h
      permissions:
        "today*":
          lead: allow
          plan: allow
        "upcoming*":
          lead: allow
          plan: allow
        "list*":
          lead: allow
          plan: allow
        "show*":
          lead: allow
          plan: allow
        "*":
          build: deny

    - name: minutes
      repo: silverstein/minutes
      target: .local/bin/minutes
      asset: minutes-macos-arm64
      type: file
      executable: true
      refresh_period: 24h
      permissions:
        "person*":
          lead: allow
          plan: allow
        "research*":
          lead: allow
          plan: allow
        "consistency*":
          lead: allow
          plan: allow
        "list*":
          lead: allow
          plan: allow
        "show*":
          lead: allow
          plan: allow
        "*":
          build: deny

    - name: minutes-desktop
      repo: silverstein/minutes
      target: Applications
      app: Minutes.app
      asset: Minutes.app.tar.gz
      type: archive
      refresh_period: 24h

  # agent skills installed via gh skill install
  skills:
    - repo: BRO3886/ical
      skill: ical-cli

  # npm-managed global packages
  npm:
    homebridge_version: "1.11.4"
    ui_version: "5.21.0"
    nest_plugin_version: "0.3.9"
    ffmpeg_for_homebridge_version: "2.2.2"

  # mise-managed runtimes and tools
  mise:
    - name: ruby
      version: "3.4"
    - name: node
      version: lts
    - name: python
      version: "3"
    - name: rust
      version: stable
    - name: ruff
      version: latest
    - name: uv
      version: latest
    - name: pre-commit
      version: latest
    - name: terraform
      version: latest
    - name: helm
      version: latest
    - name: argocd
      version: latest
    - name: pipx:check-jsonschema
      version: latest
    - name: pipx:grip
      version: latest
    - name: pipx:skills-ref
      version: latest
