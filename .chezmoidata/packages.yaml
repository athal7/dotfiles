# Package registry — single source of truth for all managed dependencies.
# brew, cask, mise, and GitHub release packages. Install scripts and
# chezmoi externals are generated from this file.
#
# Each entry can also declare per-tool permission rules for OpenCode agents
# (merged into opencode.json at template time).

packages:
  taps:
    - github/gh
    - steipete/tap

  brews:
    - name: autojump
    - name: bat
      permissions:
        "*": allow
    - name: chezmoi
      permissions:
        "cat*": allow
        "verify*": allow
        "diff*": allow
        "data*": allow
        "status*": allow
        "managed*": allow
        "execute-template*": allow
        "source-path*": allow
        "*": ask
    - name: colima
    - name: direnv
    - name: docker
    - name: docker-compose
    - name: ffmpeg
    - name: git
      permissions:
        "log*": allow
        "diff*": allow
        "show*": allow
        "status*": allow
        "blame*": allow
        "reflog*": allow
        "shortlog*": allow
        "rev-parse*": allow
        "merge-base*": allow
        "for-each-ref*": allow
        "ls-*": allow
        "cat-file*": allow
        "name-rev*": allow
        "symbolic-ref*": allow
        "* list*": allow
        "* show*": allow
        "branch*": allow
        "tag -l*": allow
        "config*": allow
        "stack-*": allow
        "checkout*": allow
        "fetch*": allow
        "*": ask
    - name: gh
      permissions:
        "* list*": allow
        "* view*": allow
        "* diff*": allow
        "* checks*": allow
        "* status*": allow
        "search*": allow
        "api -X GET *": allow
        "api graphql*mutation*": ask
        "api graphql*": allow
        "*": ask
    - name: git-spice
    - name: jc
    - name: jq
      permissions:
        "*": allow
    - name: k9s
    - name: kubernetes-cli
    - name: mas
    - name: mise
    - name: neovim
    - name: openssl
    - name: opentofu
    - name: ripgrep
      command: rg
      permissions:
        "*": allow
    - name: starship
    - name: talisman
    - name: watch
    - name: worktrunk
    - name: xh
      permissions:
        "*GET *": allow
        "*HEAD *": allow
        "*mutation*": ask
        "*query*": allow
        "*": ask
    - name: googleworkspace-cli
      command: gws
      permissions:
        "* list*": allow
        "* get*": allow
        "*": ask
    - name: steipete/tap/remindctl
      command: remindctl
      permissions:
        "show*": allow
        "list*": allow
        "status*": allow
        "*": ask
    - name: typescript-language-server
    - name: pyright
    - name: gopls
    - name: terraform-ls
    - name: lua-language-server
    - name: bash-language-server
    - name: yaml-language-server

  casks:
    - name: gcloud-cli
    - name: font-monaspace
    - name: ghostty
    - name: claude-code
    - name: stats
    - name: tailscale-app
    - name: lm-studio
    - name: obsidian

  # GitHub releases — installed via .chezmoiexternal.toml.tmpl
  github_releases:
    - name: opencode
      repo: sst/opencode
      target: .local/bin/opencode
      asset: opencode-darwin-arm64.zip
      type: archive-file
      path: opencode
      executable: true
      refresh_period: 24h

    - name: opencode-desktop
      repo: sst/opencode
      target: Applications
      app: OpenCode.app
      asset: opencode-desktop-mac-arm64.app.tar.gz
      type: archive
      refresh_period: 24h

    # Note: com.apple.provenance on Apple Silicon prevents chezmoi's atomic
    # rename from updating files inside this bundle. On version updates, run:
    #   rm -rf ~/Applications/NayaFlow-Beta.app && chezmoi apply
    - name: naya-flow-beta
      repo: NayaTech/NayaFlow-beta-releases
      target: Applications
      app: NayaFlow-Beta.app
      asset: NayaFlow-Beta-*-arm64-mac.zip
      type: archive
      refresh_period: 24h

    - name: ical
      repo: BRO3886/ical
      target: .local/bin/ical
      asset: ical-darwin-arm64.tar.gz
      type: archive-file
      path: ical
      executable: true
      refresh_period: 24h
      permissions:
        "today*": allow
        "upcoming*": allow
        "list*": allow
        "show*": allow
        "*": ask

  # agent skills installed via gh skill install
  skills:
    - repo: BRO3886/ical
      skill: ical-cli

  # npm-managed global packages
  npm:
    homebridge_version: "1.11.4"
    ui_version: "5.21.0"
    nest_plugin_version: "0.3.9"
    ffmpeg_for_homebridge_version: "2.2.2"

  # mise-managed runtimes and tools
  mise:
    - name: ruby
      version: "3.4"
    - name: node
      version: lts
    - name: python
      version: "3"
    - name: rust
      version: stable
    - name: ruff
      version: latest
    - name: uv
      version: latest
    - name: pre-commit
      version: latest
    - name: terraform
      version: latest
    - name: helm
      version: latest
    - name: argocd
      version: latest
    - name: pipx:check-jsonschema
      version: latest
    - name: pipx:grip
      version: latest
    - name: pipx:skills-ref
      version: latest
