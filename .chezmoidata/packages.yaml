# Package registry — single source of truth for all managed dependencies.
# brew, cask, mise, and GitHub release packages. Install scripts and
# chezmoi externals are generated from this file.
#
# Each entry can also declare per-tool permission rules for OpenCode agents
# (merged into opencode.json at template time).

packages:
  taps:
    - athal7/tap
    - github/gh
    - jnsahaj/lumen
    - steipete/tap

  brews:
    - name: aoe
    - name: autojump
    - name: bat
    - name: chezmoi
      permissions:
        "chezmoi apply*": ask
        "chezmoi-deploy*": ask
        "chezmoi destroy*": ask
        "chezmoi init*": ask
        "chezmoi purge*": ask
        "chezmoi forget*": ask
        "chezmoi upgrade*": ask
        "chezmoi add*": ask
        "chezmoi diff*": allow
        "chezmoi status*": allow
        "chezmoi data*": allow
        "chezmoi cat*": allow
        "chezmoi managed*": allow
        "chezmoi source-path*": allow
    - name: colima
    - name: direnv
    - name: docker
    - name: docker-compose
    - name: ffmpeg
    - name: git
      permissions:
        "git commit*": ask
        "git push*": ask
        "git reset --hard*": ask
        "git reset --merge*": ask
        "git clean -f*": ask
        "git clean -d*": ask
        "git checkout -- *": ask
        "git checkout * -- *": ask
        "git restore *": ask
        "git restore --staged*": allow
        "git branch -d*": ask
        "git branch -D*": ask
        "git stash drop*": ask
        "git stash clear*": ask
        "git worktree remove*": ask
        "git -C * commit*": ask
        "git -C * push*": ask
        "git -C * reset --hard*": ask
        "git -C * clean -f*": ask
        "git status*": allow
        "git diff*": allow
        "git log*": allow
        "git show*": allow
        "git add*": allow
        "git stash list*": allow
        "git rev-parse*": allow
        "git config --get*": allow
        "git remote -v*": allow
        "git remote show*": allow
        "git remote get-url*": allow
    - name: gh
      permissions:
        # Single pathway for GitHub interaction is the `github` MCP subagent (see
        # dot_config/opencode/prompts/github.md) — no bash gh exceptions, not even reads.
        "gh *": deny
    - name: athal7/tap/git-worktree-sync
    - name: athal7/tap/launchd-yaml
    - name: git-spice
    - name: jc
    - name: jq
    - name: k9s
    - name: kubernetes-cli
    - name: jnsahaj/lumen/lumen
    - name: macos-trash
    - name: mas
    - name: mise
    - name: neovim
    - name: openspec
    - name: openssl
    - name: opentofu
    - name: ripgrep
    - name: starship
    - name: talisman
    - name: watch
    - name: worktrunk
    - name: xh
      permissions:
        "xh *GET *": allow
        "xh *HEAD *": allow
        "xh *mutation*": ask
        "xh *query*": allow
        "xh *": ask
    - name: yq
    - name: steipete/tap/remindctl
      permissions:
        "remindctl show*": allow
        "remindctl list*": allow
        "remindctl status*": allow
        "remindctl *": ask
    - name: typescript-language-server
    - name: pyright
    - name: gopls
    - name: terraform-ls
    - name: lua-language-server
    - name: bash-language-server
    - name: yaml-language-server

  # aoe (Agent of Empires) plugins — installed/updated via
  # run_onchange_after_plugins-aoe.sh.tmpl. A list from day one (even with a
  # single entry) so adding another aoe plugin later is a one-line registry
  # edit, matching the idiom of every other registry key here.
  aoe_plugins:
    - source: "gh:agent-of-empires/plugin-github"
      id: "agent-of-empires.github"

  casks:
    - name: gcloud-cli
    - name: font-monaspace
    - name: ghostty
    - name: claude-code
    - name: menumeters
    - name: tailscale-app
    - name: lm-studio
    - name: obsidian
    - name: figma

  # GitHub releases — installed via .chezmoiexternal.toml.tmpl
  github_releases:
    - name: opencode
      repo: anomalyco/opencode
      target: .local/bin/opencode
      asset: opencode-darwin-arm64.zip
      type: archive-file
      path: opencode
      executable: true
      refresh_period: 24h
      permissions:
        "opencode session *": allow
        "opencode export *": allow
        "opencode *": ask

    # Note: com.apple.provenance on Apple Silicon prevents chezmoi's atomic
    # rename from updating files inside this bundle. On version updates, run:
    #   rm -rf ~/Applications/NayaFlow-Beta.app && chezmoi apply
    - name: naya-flow-beta
      repo: NayaTech/NayaFlow-beta-releases
      target: Applications
      app: NayaFlow-Beta.app
      asset: NayaFlow-Beta-*-arm64-mac.zip
      type: archive
      refresh_period: 24h

    - name: ical
      repo: BRO3886/ical
      target: .local/bin/ical
      asset: ical-darwin-arm64.tar.gz
      type: archive-file
      path: ical
      executable: true
      refresh_period: 24h

  # Non-authored skills synced into the global skill dir. Two entry shapes:
  #   - remote: { repo, skill }   → fetched via `gh skill install`
  #   - local:  { source, match } → mirrored from a project dir (skills a CLI
  #     like openspec generates project-locally; `match` globs the dir names)
  skills:
    - repo: BRO3886/ical
      skill: ical-cli
    - source: .opencode/skills
      match: openspec-*

  # npm-managed global packages
  npm:
    homebridge_version: "1.11.4"
    ui_version: "5.21.0"
    nest_sdm_version: "1.1.23"
    ffmpeg_for_homebridge_version: "2.2.2"

  # mise-managed runtimes and tools
  mise:
    - name: ruby
      version: "3.4"
    - name: node
      version: lts
    - name: python
      version: "3"
    - name: rust
      version: stable
    - name: ruff
      version: latest
    - name: uv
      version: latest
    - name: pre-commit
      version: latest
    - name: terraform
      version: latest
    - name: helm
      version: latest
    - name: argocd
      version: latest
    # Token-efficiency opencode plugin (also wired in opencode.json.tmpl's
    # plugin array; declared here for the repo's package-registry convention).
    - name: npm:@tarquinen/opencode-dcp
      version: "3.1.12"
    - name: pipx:pytest
      version: latest
    - name: pipx:check-jsonschema
      version: latest
    - name: pipx:grip
      version: latest
    - name: pipx:skills-ref
      version: latest
