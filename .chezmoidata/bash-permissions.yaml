bashPermissions:
  # Destructive system commands — prompt the human everywhere these apply.
  # (moved verbatim from the old $coreGuardrails inline dict)
  guardrails:
    "rm -rf /*": ask
    "rm -fr /*": ask
    "rm -rf ~*": ask
    "rm -fr ~*": ask
    "rm -rf $HOME*": ask
    "sudo *": ask
    "dd if=*": ask
    "dd of=*": ask
    "mkfs*": ask
    "diskutil *": ask
    "shutdown*": ask
    "reboot*": ask
    "curl * -X POST*": ask
    "curl * -X PUT*": ask
    "curl * -X DELETE*": ask
    "curl * -X PATCH*": ask
    "curl * -d *": ask
    "curl * --data*": ask
    "curl * -T *": ask
    "curl * --upload-file*": ask
    "wget *": ask
  # Named, reusable allow-lists. Package-tool perms (git/chezmoi/rg/jq/yq/…)
  # live in packages.yaml co-located with each tool; only non-package commands
  # belong here.
  lists:
    # lead: harmless non-package navigation layered onto its allow base.
    lead:
      "ls*": allow
      "pwd": allow
      # Sole exception to the packages.yaml `gh *: deny` retirement (see
      # bd5e983): the Deployments API has no `github` MCP tool coverage, so
      # lead runs `gh api .../deployments` directly per
      # skills/qa-report-publish/SKILL.md. Scoped to lead only, ask (not
      # allow) since it's a remote write — matches the curl -X POST* etc.
      # guardrails above.
      "gh api */deployments*": ask
      # Job-log gap: github MCP's get_check_runs returns status/conclusion
      # metadata only — no get_job_logs/actions_get tool exists on this MCP
      # server surface, so there's no way to fetch actual failure log text
      # via MCP. Run id comes from the check-run's html_url (.../actions/runs/<run_id>/job/<job_id>).
      # Scoped to lead only, matching the Deployments API exception above.
      # Read-only (unlike the deployments write), so allow rather than ask.
      "gh run view*": allow
    build:
      "git commit*": deny
      "git -C * commit*": deny
    # readonly: non-package read commands for future read-only-subagent use.
    # (Package-tool reads — git/chezmoi/etc. — come via the packages set, not here.)
    readonly:
      "ls*": allow
      "pwd": allow
      "cd *": allow
      "echo *": allow
      "grep *": allow
      "find *": allow
      "fd *": allow
      "cat *": allow
      "head *": allow
      "tail *": allow
      "wc *": allow
      "sed *": allow
      "sed -i*": deny
  # Per-agent composition. base = the "*" rule; lists = named allow-lists to
  # layer on; guardrails/packages = whether to fold in those sets.
  # Only entries that need a non-default bash block are defined here.
  agents:
    global: { base: allow, lists: [],     guardrails: true, packages: true }  # top-level permission.bash
    lead:   { base: allow, lists: [lead], guardrails: true, packages: true }
    build:  { base: allow, lists: [build], guardrails: true, packages: true }
