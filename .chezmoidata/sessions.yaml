xh_sessions:
  slack_user_token:
    host: slack.com
    header: authorization
    format: "Bearer {value}"
  linear_api_key:
    host: api.linear.app
    header: authorization
    format: "{value}"
  pagerduty_api_token:
    host: api.pagerduty.com
    headers:
      - name: authorization
        format: "Token token={value}"
      - name: accept
        value: "application/vnd.pagerduty+json;version=2"
  figma_access_token:
    host: api.figma.com
    header: x-figma-token
    format: "{value}"
  confluence_api_token:
    host_data: confluenceHost
    auth_type: basic
    username_from: confluence_email
  es_api_key:
    host_data: esHost
    header: authorization
    format: "ApiKey {value}"
