xh_sessions:
  linear_api_key:
    host: api.linear.app
    header: authorization
    format: "{value}"
  pagerduty_api_token:
    host: api.pagerduty.com
    headers:
      - name: authorization
        format: "Token token={value}"
      - name: accept
        value: "application/vnd.pagerduty+json;version=2"
  figma_access_token:
    host: api.figma.com
    header: x-figma-token
    format: "{value}"
  es_api_key:
    host_data: esHost
    header: authorization
    format: "ApiKey {value}"
