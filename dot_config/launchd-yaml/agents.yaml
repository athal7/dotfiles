# launchd LaunchAgent definitions — single source of truth for all plists.
#
# Each entry's value is the plist payload expressed as YAML, using $HOME and
# $USER placeholders (substituted with the real home directory and username at
# apply time). The generator script .chezmoiscripts/run_onchange_after_aa-launch-agents.sh
# renders, deploys, reloads, and prunes these agents: it pipes `yq -o=json`
# through `plutil -convert xml1`, writes each plist to
# ~/Library/LaunchAgents/<name>.plist, reloads only agents whose plist content
# changed, and removes agents that were deleted from this file. The individual
# plists are NOT individually chezmoi-managed.
#
# Typing matters — YAML integers become plist <integer>, YAML booleans become
# <true/>/<false/>. ProgramArguments are always strings, so numeric args
# (timeouts, ports) must be quoted.
launchagents:
  aoe-serve:
    Label: com.$USER.aoe-serve
    ProgramArguments:
      - $HOME/.local/bin/aoe-serve
    RunAtLoad: true
    KeepAlive: true
    ProcessType: Interactive
    StandardOutPath: $HOME/Library/Logs/aoe-serve.log
    StandardErrorPath: $HOME/Library/Logs/aoe-serve.error.log
    EnvironmentVariables:
      HOME: $HOME

  tailscale-serve-aoe:
    Label: com.$USER.tailscale-serve-aoe
    ProgramArguments:
      - /Applications/Tailscale.app/Contents/MacOS/Tailscale
      - serve
      - --bg
      - --https=4097
      - http://127.0.0.1:4097
    RunAtLoad: true
    StandardOutPath: $HOME/Library/Logs/tailscale-serve-aoe.log
    StandardErrorPath: $HOME/Library/Logs/tailscale-serve-aoe.error.log

  audit:
    Label: com.$USER.audit
    ProgramArguments:
      - $HOME/.local/bin/aoe-cmd
      - -d
      - $HOME/code/dotfiles
      - -n
      - audit
      - /audit
    StartCalendarInterval:
      Day: 1
      Hour: 8
      Minute: 0
    StandardOutPath: $HOME/Library/Logs/audit.log
    StandardErrorPath: $HOME/Library/Logs/audit.log
    EnvironmentVariables:
      PATH: $HOME/.local/bin:$HOME/.local/share/mise/shims:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin

  babysitter-check:
    Label: com.$USER.babysitter-check
    ProgramArguments:
      - /opt/homebrew/bin/python3
      - -m
      - cal
      - babysitter
    StartCalendarInterval:
      Hour: 8
      Minute: 0
    StandardOutPath: $HOME/Library/Logs/babysitter-check.log
    StandardErrorPath: $HOME/Library/Logs/babysitter-check.error.log
    EnvironmentVariables:
      PATH: $HOME/.local/bin:$HOME/.local/share/mise/shims:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
      PYTHONPATH: $HOME/.local/lib

  check-error-logs:
    Label: com.$USER.check-error-logs
    ProgramArguments:
      - $HOME/.local/bin/check-error-logs
    StartCalendarInterval:
      Hour: 9
      Minute: 0
    StandardOutPath: $HOME/Library/Logs/check-error-logs.log
    StandardErrorPath: $HOME/Library/Logs/check-error-logs.error.log
    EnvironmentVariables:
      PATH: $HOME/.local/bin:$HOME/.local/share/mise/shims:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin

  cleanup:
    Label: com.$USER.cleanup
    ProgramArguments:
      - $HOME/.config/opencode/bin/opencode-cleanup
      - --force
    StartCalendarInterval:
      Weekday: 0
      Hour: 4
      Minute: 0
    StandardOutPath: $HOME/Library/Logs/cleanup.log
    StandardErrorPath: $HOME/Library/Logs/cleanup.log
    EnvironmentVariables:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
      HOME: $HOME

  family-scheduler:
    Label: com.$USER.family-scheduler
    ProgramArguments:
      - python3
      - -m
      - cal
      - family
    StartCalendarInterval:
      Weekday: 2
      Hour: 8
      Minute: 0
    StandardOutPath: $HOME/Library/Logs/family-scheduler.log
    StandardErrorPath: $HOME/Library/Logs/family-scheduler.error.log
    EnvironmentVariables:
      PATH: $HOME/.local/bin:$HOME/.local/share/mise/shims:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
      PYTHONPATH: $HOME/.local/lib

  fix-prod-errors:
    Label: com.$USER.fix-prod-errors
    ProgramArguments:
      - $HOME/.local/bin/aoe-cmd
      - -d
      - $HOME/code/dotfiles
      - -n
      - fix-prod-errors
      - /fix-prod-errors
    # Weekday evenings only (1=Mon … 5=Fri) at 20:00. The workday is complete
    # by then, so each run simply covers that same day's errors.
    StartCalendarInterval:
      - Weekday: 1
        Hour: 20
        Minute: 0
      - Weekday: 2
        Hour: 20
        Minute: 0
      - Weekday: 3
        Hour: 20
        Minute: 0
      - Weekday: 4
        Hour: 20
        Minute: 0
      - Weekday: 5
        Hour: 20
        Minute: 0
    StandardOutPath: $HOME/Library/Logs/fix-prod-errors.log
    StandardErrorPath: $HOME/Library/Logs/fix-prod-errors.log
    EnvironmentVariables:
      PATH: $HOME/.local/bin:$HOME/.local/share/mise/shims:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin

  git-worktree-sync:
    Label: com.$USER.git-worktree-sync
    ProgramArguments:
      - $HOME/.local/bin/git-worktree-sync
    StartInterval: 900
    StandardOutPath: $HOME/Library/Logs/git-worktree-sync.log
    StandardErrorPath: $HOME/Library/Logs/git-worktree-sync.error.log
    EnvironmentVariables:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin

  homebridge:
    Label: com.$USER.homebridge
    ProgramArguments:
      - $HOME/.local/share/mise/shims/homebridge
      - -U
      - $HOME/.homebridge
    RunAtLoad: true
    KeepAlive: true
    WorkingDirectory: $HOME/.homebridge
    StandardOutPath: $HOME/Library/Logs/homebridge.log
    StandardErrorPath: $HOME/Library/Logs/homebridge.error.log
    EnvironmentVariables:
      PATH: $HOME/.local/share/mise/shims:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
      HOME: $HOME
      UIX_STORAGE_PATH: $HOME/.homebridge

  kb-enrich:
    Label: com.$USER.kb-enrich
    ProgramArguments:
      - $HOME/.local/bin/aoe-cmd
      - -d
      - $HOME/code/dotfiles
      - -n
      - kb-enrich
      - /kb-enrich
    # Weekday evenings only (1=Mon … 5=Fri) at 20:00. The workday is complete
    # by then, so each run simply enriches that same day's activity.
    StartCalendarInterval:
      - Weekday: 1
        Hour: 20
        Minute: 0
      - Weekday: 2
        Hour: 20
        Minute: 0
      - Weekday: 3
        Hour: 20
        Minute: 0
      - Weekday: 4
        Hour: 20
        Minute: 0
      - Weekday: 5
        Hour: 20
        Minute: 0
    StandardOutPath: $HOME/Library/Logs/kb-enrich.log
    StandardErrorPath: $HOME/Library/Logs/kb-enrich.log
    EnvironmentVariables:
      PATH: $HOME/.local/bin:$HOME/.local/share/mise/shims:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin

  mlx-qwen-server:
    Label: com.$USER.mlx-qwen-server
    ProgramArguments:
      # Runs through a launcher shim (dot_local/bin/executable_mlx-lm-server-launcher.tmpl)
      # instead of the bare mlx_lm.server mise shim: it monkeypatches
      # mx.set_wired_limit() to a no-op before importing mlx_lm.server, to
      # work around a recurring IOGPUFamily residency-race kernel panic
      # (IOGPUMemory.cpp:550) — mlx_lm.server pins ~75% of RAM as
      # non-swappable GPU working set via set_wired_limit() and keeps
      # re-touching that pin during batched serving, the leading theory for
      # the panic. It also logs periodic GPU memory stats for correlating
      # future panics with the memory trend leading up to them.
      - $HOME/.local/bin/mlx-lm-server-launcher
      - --model
      - mlx-community/Qwen3.6-35B-A3B-OptiQ-4bit
      - --host
      - 127.0.0.1
      - --port
      - "1234"
      - --log-level
      - INFO
      # Concurrency: dropped to 1 (was 2) as a diagnostic/mitigation for the
      # same IOGPUFamily panic. mlx#3866 implicates mid-batch admission of
      # varying-length requests as a reliable trigger; serializing to 1
      # concurrent request avoids that admission path entirely.
      - --decode-concurrency
      - "1"
      - --prompt-concurrency
      - "1"
      # Cap generation length to prevent runaway output.
      - --max-tokens
      - "2048"
    RunAtLoad: true
    KeepAlive: true
    ProcessType: Interactive
    StandardOutPath: $HOME/Library/Logs/mlx-qwen-server.log
    StandardErrorPath: $HOME/Library/Logs/mlx-qwen-server.error.log
    EnvironmentVariables:
      PATH: $HOME/.local/share/mise/shims:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
      HOME: $HOME

  naya-sync:
    Label: com.$USER.naya-sync
    ProgramArguments:
      - $HOME/.local/bin/naya-sync
    WatchPaths:
      - $HOME/Library/Application Support/NayaFlow/user-data.db
      - $HOME/Library/Application Support/NayaFlow-Beta/user-data-beta.db
    StandardOutPath: $HOME/Library/Logs/naya-sync.log
    StandardErrorPath: $HOME/Library/Logs/naya-sync.error.log
    EnvironmentVariables:
      PATH: $HOME/.local/bin:$HOME/.local/share/mise/shims:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
      HOME: $HOME

  refactor-hotspots:
    Label: com.$USER.refactor-hotspots
    ProgramArguments:
      - $HOME/.local/bin/aoe-cmd
      - -d
      - $HOME/code/dotfiles
      - -n
      - refactor-hotspots
      - /refactor-hotspots
    StartCalendarInterval:
      Weekday: 0
      Hour: 8
      Minute: 0
    StandardOutPath: $HOME/Library/Logs/refactor-hotspots.log
    StandardErrorPath: $HOME/Library/Logs/refactor-hotspots.log
    EnvironmentVariables:
      PATH: $HOME/.local/bin:$HOME/.local/share/mise/shims:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin

  setenv-gui-path:
    Label: com.$USER.setenv-gui-path
    ProgramArguments:
      - /bin/launchctl
      - setenv
      - PATH
      - $HOME/.local/bin:$HOME/.local/share/mise/shims:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    RunAtLoad: true
    LimitLoadToSessionType: Aqua

  sync-calendars:
    Label: com.$USER.sync-calendars
    ProgramArguments:
      - /opt/homebrew/bin/python3
      - -m
      - cal
      - sync
    StartInterval: 3600
    RunAtLoad: true
    StandardOutPath: $HOME/Library/Logs/sync-calendars.log
    StandardErrorPath: $HOME/Library/Logs/sync-calendars.error.log
    EnvironmentVariables:
      PATH: $HOME/.local/bin:$HOME/.local/share/mise/shims:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
      PYTHONPATH: $HOME/.local/lib
